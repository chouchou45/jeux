<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlipMemory</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🎮 🧠 FlipMemory</h1>

    <div class="controls">
        <label for="difficulty">Niveau :</label>

        <select id="difficulty">
            <option value="4">Facile (4×4)</option>
            <option value="6">Moyen (6×6)</option>
            <option value="8">Difficile (8×8)</option>
        </select>

        <button id="restartBtn">
            Nouvelle Partie
        </button>
    </div>

    <div class="stats">

        <div class="stat-box">
            Tentatives
            <span id="moves">0</span>
        </div>

        <div class="stat-box">
            Paires tentées
            <span id="attempts">0</span>
        </div>

        <div class="stat-box">
            Temps
            <span id="timer">00:00</span>
        </div>

        <div class="stat-box">
            Record
            <span id="bestScore">-</span>
        </div>

    </div>

    <div id="board" class="game-board"></div>

    <div id="message"></div>

</div>

<script src="script.js"></script>

</body>
</html>
